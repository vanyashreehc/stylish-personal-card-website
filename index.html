<!DOCTYPE html>
<html>
<head>
  <title>My Profile</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin: 5px 0;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: white;
      color: #764ba2;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Jhanavi S Gowda</h1>
  <p>💻 CSE Student</p>
  <p>🚀 Future Entrepreneur</p>
  <p>🌍 Dream: Travel the World</p>

  <button onclick="showMessage()">Click Me</button>
</div>

<script>
  function showMessage() {
    alert("Welcome to my GitHub project 🚀");
  }
</script>

</body>
</html>
